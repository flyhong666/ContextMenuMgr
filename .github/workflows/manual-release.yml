name: Release

on:
  workflow_dispatch:
    inputs:
      configuration:
        description: Build configuration
        required: false
        default: Release
        type: choice
        options:
          - Release
          - Beta
          - Debug
      app_id:
        description: Installer/App GUID metadata value
        required: false
        default: 45156332-3408-47B7-B5D2-2567E5888F64
        type: string

permissions:
  contents: write

jobs:
  resolve-metadata:
    runs-on: windows-latest
    outputs:
      release_version: ${{ steps.version.outputs.release_version }}
      release_tag: ${{ steps.version.outputs.release_tag }}
      release_name: ${{ steps.version.outputs.release_name }}
      prerelease: ${{ steps.version.outputs.prerelease }}
      previous_tag: ${{ steps.version.outputs.previous_tag }}
      should_create_release: ${{ steps.version.outputs.should_create_release }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Resolve release metadata
        id: version
        shell: pwsh
        run: .\Scripts\Resolve-Version.ps1 -Configuration "${{ inputs.configuration }}"

      - name: Beta version gate
        if: inputs.configuration == 'Beta' && steps.version.outputs.should_create_release == 'true'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          .\Scripts\Test-BetaVersionGate.ps1 `
            -BetaVersion '${{ steps.version.outputs.release_version }}' `
            -OwnerRepo '${{ github.repository }}'

      - name: Create release notes
        shell: pwsh
        run: .\Scripts\New-ReleaseNotes.ps1 -PreviousTag "${{ steps.version.outputs.previous_tag }}" -OutputPath build/release-body.md

      - name: Upload release body
        uses: actions/upload-artifact@v7
        with:
          name: release-body
          path: build/release-body.md
          if-no-files-found: error

  build:
    needs: resolve-metadata
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - kind: installer
            platform: win-x64
            distribution: self-contained
          - kind: installer
            platform: win-x86
            distribution: self-contained
          - kind: installer
            platform: win-arm64
            distribution: self-contained
          - kind: installer
            platform: win-x64
            distribution: framework-dependent
          - kind: installer
            platform: win-x86
            distribution: framework-dependent
          - kind: installer
            platform: win-arm64
            distribution: framework-dependent
          - kind: portable
            platform: anycpu
            distribution: framework-dependent

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Build package target
        shell: pwsh
        run: |
          .\Scripts\Build-Target.ps1 `
            -Kind "${{ matrix.kind }}" `
            -Platform "${{ matrix.platform }}" `
            -DistributionMode "${{ matrix.distribution }}" `
            -Configuration "${{ inputs.configuration }}" `
            -AppId "${{ inputs.app_id }}" `
            -Version "${{ needs.resolve-metadata.outputs.release_version }}"

      - name: Upload package artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ContextMenuMgrPlus-${{ needs.resolve-metadata.outputs.release_tag }}-${{ matrix.platform }}-${{ matrix.distribution }}-${{ matrix.kind }}
          path: build/dist/*
          if-no-files-found: error

  create-release:
    needs:
      - resolve-metadata
      - build
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download build artifacts
        uses: actions/download-artifact@v7
        with:
          path: downloaded-artifacts
          pattern: ContextMenuMgrPlus-*

      - name: Download release body
        uses: actions/download-artifact@v7
        with:
          name: release-body
          path: build

      - name: Flatten artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path build/dist | Out-Null
          Get-ChildItem -LiteralPath downloaded-artifacts -Recurse -File |
            Where-Object { $_.Extension -in '.exe', '.zip' } |
            ForEach-Object {
              Copy-Item -LiteralPath $_.FullName -Destination (Join-Path 'build/dist' $_.Name) -Force
            }

      - name: Append SHA256 table
        shell: pwsh
        run: .\Scripts\New-ChecksumTable.ps1 -ArtifactDirectory build/dist -ReleaseBodyPath build/release-body.md

      - name: Create draft release
        if: needs.resolve-metadata.outputs.should_create_release == 'true'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.resolve-metadata.outputs.release_tag }}
          name: ${{ needs.resolve-metadata.outputs.release_name }}
          draft: true
          prerelease: ${{ needs.resolve-metadata.outputs.prerelease }}
          body_path: build/release-body.md
          files: build/dist/*
